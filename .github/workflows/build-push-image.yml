jobs:
  build-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t imageku .

      - name: Login to GitHub Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u shinta9911 --password-stdin

      - name: Tag image
        run: docker tag imageku ghcr.io/shinta9911/imageku:latest

      - name: Push Imae
        run: docker push ghcr.io/shinta9911/imageku:latest
